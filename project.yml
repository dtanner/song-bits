name: SongBits
options:
  bundleIdPrefix: com.dantanner
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
attributes:
  LastUpgradeCheck: "2660"
settings:
  base:
    SWIFT_VERSION: "5.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    # Bumped by `just release` — MARKETING_VERSION is the last released semver,
    # CURRENT_PROJECT_VERSION a monotonically increasing integer build number.
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2"
targets:
  SongBits:
    type: application
    platform: iOS
    sources:
      - path: SongBits
    settings:
      base:
        DEVELOPMENT_TEAM: 72SPM7GVK7
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.dantanner.songbits
        PRODUCT_NAME: SongBits
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    info:
      path: SongBits/Info.plist
      properties:
        CFBundleDisplayName: Song Bits
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSMicrophoneUsageDescription: "Song Bits uses the microphone to record your song ideas."
        ITSAppUsesNonExemptEncryption: false
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
  SongBitsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SongBitsTests
    dependencies:
      - target: SongBits
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dantanner.songbits.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  SongBits:
    build:
      targets:
        SongBits: all
        SongBitsTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SongBitsTests
