name: SongBits
options:
  bundleIdPrefix: com.dantanner
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  SongBits:
    type: application
    platform: iOS
    sources:
      - path: SongBits
    settings:
      base:
        DEVELOPMENT_TEAM: PG956FSTJB
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.dantanner.songbits
        PRODUCT_NAME: SongBits
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    info:
      path: SongBits/Info.plist
      properties:
        CFBundleDisplayName: SongBits
        NSMicrophoneUsageDescription: "SongBits uses the microphone to record audio takes."
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
